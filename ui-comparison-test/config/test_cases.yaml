# UI 比對測試案例定義
# 基於 QA 測試計劃附圖定義

test_cases:
  - name: "我的最愛"
    steps:
      - action: "click"
        cocos_node_path: "Canvas/viewRoot/Layer_Default/ColorGameLobbyView/.../FavoriteButton"
    expected: "大廳刷新,房間到最頂"
    wait_for_api: null
    screenshot:
      mode: "full_page"  # full_page, element, 或 both
      element_node_path: null

  - name: "路書_UJP房開局"
    steps:
      - action: "navigate"
        url: "{url}/room/ujp"
      - action: "wait_for_openround"
    expected: "1.三同有同色外框 2.顯示倍率 3.JP/倍率互相切换"
    wait_for_api: "openround"
    screenshot:
      mode: "element"
      element_node_path: "Canvas/viewRoot/Layer_Default/ColorGameRoomView/.../RoadmapPanel"

  - name: "路書_500X房開局"
    steps:
      - action: "navigate"
        url: "{url}/room/500x"
      - action: "wait_for_openround"
    expected: "1.三同有固定黃色外框 2.顯示倍率"
    wait_for_api: "openround"
    screenshot:
      mode: "element"
      element_node_path: "Canvas/viewRoot/Layer_Default/ColorGameBonusRoomView/.../RoadmapPanel"

  - name: "大廳房間人數更新"
    steps:
      - action: "navigate"
        url: "{url}/lobby"
      - action: "enter_room"
        room: "CGIGOJP1"
      - action: "exit_room"
      - action: "wait_for_payout"
    expected: "人數只有透過進房 payout事件刷新"
    wait_for_api: "payout"
    screenshot:
      mode: "element"
      element_node_path: "Canvas/viewRoot/Layer_Default/ColorGameLobbyView/.../RoomList"

  - name: "JP金額更新"
    steps:
      - action: "navigate"
        url: "{url}/room/ujp"
      - action: "place_bet"
        amount: 100
      - action: "wait_for_payout"
    expected: "金額有依照抽水增加 有依照中獎後回歸到初始水位"
    wait_for_api: "payout"
    screenshot:
      mode: "element"
      element_node_path: "Canvas/viewRoot/Layer_Default/ColorGameRoomView/.../JPAmountLabel"

  - name: "title"
    steps:
      - action: "navigate"
        url: "{url}/room/500x"
    expected: "藍色標題"
    wait_for_api: null
    screenshot:
      mode: "element"
      element_node_path: "Canvas/viewRoot/Layer_Default/ColorGameBonusRoomView/.../TitleLabel"

  - name: "Loading圖"
    steps:
      - action: "navigate"
        url: "{url}/room/500x"
      - action: "wait_for_loading"
    expected: "icon & background大小有被壓縮 但不會破圖"
    wait_for_api: null
    screenshot:
      mode: "full_page"
      element_node_path: null

  - name: "跑馬燈內容與配置一致"
    steps:
      - action: "navigate"
        url: "{url}/lobby"
      - action: "wait_for_marquee"
    expected: "顯示內文與配置一致,點擊跑馬燈 跳轉到房間或指定網址"
    wait_for_api: null
    screenshot:
      mode: "element"
      element_node_path: "Canvas/viewRoot/Layer_Default/ColorGameLobbyView/.../MarqueePanel"

  - name: "廣告內容與配置一致"
    steps:
      - action: "navigate"
        url: "{url}/lobby"
      - action: "wait_for_ad"
    expected: "顯示內文與配置一致,點擊廣告 跳轉到房間或指定網址"
    wait_for_api: null
    screenshot:
      mode: "element"
      element_node_path: "Canvas/viewRoot/Layer_Default/ColorGameLobbyView/.../AdPanel"

  - name: "Get Bonus"
    steps:
      - action: "navigate"
        url: "{url}/room/500x"
      - action: "click"
        cocos_node_path: "Canvas/viewRoot/Layer_Default/ColorGameBonusRoomView/.../GetBonusButton"
      - action: "wait_for_console"
    expected: "需到QAT環境驗證, 其餘環境只能從devtools_console確認"
    wait_for_api: null
    screenshot:
      mode: "full_page"
      element_node_path: null

