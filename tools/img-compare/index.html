<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🖼️ 圖片比對工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1b1e;
      --surface:  #25262b;
      --surface2: #2c2e33;
      --surface3: #373a40;
      --border:   #373a40;
      --text:     #c9d1d9;
      --muted:    #6e7681;
      --green:    #51cf66;
      --yellow:   #ffd43b;
      --red:      #ff6b6b;
      --blue:     #74c0fc;
      --purple:   #cc5de8;
      --orange:   #fd7e14;
      --accent:   #1971c2;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      font-size: 14px;
      padding: 24px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header { margin-bottom: 20px; }
    .page-title  { font-size: 20px; font-weight: 700; color: #e9ecef; }
    .page-subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--blue);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }

    /* ── Inputs ── */
    .url-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-group label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .mode-fieldset {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px 10px;
      margin-bottom: 14px;
      background: var(--bg);
    }
    .mode-fieldset legend {
      font-size: 11px;
      font-weight: 700;
      color: var(--blue);
      padding: 0 6px;
    }
    .mode-options { display: flex; flex-direction: column; gap: 8px; }
    .mode-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
    }
    .mode-option input { margin-top: 3px; accent-color: var(--accent); }
    .mode-option .mode-title { font-weight: 600; }
    .mode-option .mode-desc {
      font-size: 11px; color: var(--muted); font-weight: 400;
      margin-top: 2px; line-height: 1.4;
    }
    .input-group .label-a { color: var(--blue); }
    .input-group .label-b { color: var(--purple); }

    input[type="text"] {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      padding: 8px 12px; font-size: 13px; outline: none;
      transition: border-color .2s; width: 100%;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    button {
      padding: 8px 18px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: filter .15s, opacity .15s; white-space: nowrap;
    }
    button:hover:not(:disabled) { filter: brightness(1.12); }
    button:disabled { opacity: .45; cursor: default; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-success   { background: #2f9e44; color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: #c92a2a; color: #fff; }
    .btn-large     { padding: 11px 32px; font-size: 15px; }
    .btn-sm        { padding: 5px 12px; font-size: 12px; }

    .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    /* ── Progress ── */
    #progress-area { margin-top: 16px; display: none; }
    .progress-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .progress-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .progress-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .progress-label.a { color: var(--blue); }
    .progress-label.b { color: var(--purple); }
    .progress-bar-wrap {
      background: var(--surface3);
      border-radius: 4px;
      height: 4px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 4px;
      transition: width .3s;
      width: 0%;
    }
    .progress-bar.a { background: var(--blue); }
    .progress-bar.b { background: var(--purple); }
    .progress-msg { font-size: 11px; color: var(--muted); }
    .progress-count { font-size: 12px; font-weight: 600; margin-top: 2px; }

    /* ── Results ── */
    #results { display: none; }

    /* ── Tabs ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); filter: none; }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    .tab-panel { display: none; padding-top: 16px; }
    .tab-panel.active { display: block; }

    /* ── Overview cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .stat-card.ok    .stat-value { color: var(--green); }
    .stat-card.warn  .stat-value { color: var(--yellow); }
    .stat-card.error .stat-value { color: var(--red); }
    .stat-card.info  .stat-value { color: var(--blue); }

    /* ── Table ── */
    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .filter-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; color: var(--muted);
      font-size: 11px; font-weight: 600; padding: 3px 12px;
      cursor: pointer; transition: all .15s;
    }
    .filter-btn:hover { filter: none; color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .table-wrap { overflow-x: auto; }

    /* ── 載入狀態：內捲動、摺疊、A/B 兩欄 ── */
    .http-tab-hint {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 14px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .http-ab-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (min-width: 1000px) {
      .http-ab-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .http-side-card.card {
      margin-bottom: 0;
    }
    .http-details {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      background: var(--surface2);
      overflow: hidden;
    }
    .http-details > summary {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      list-style: none;
      user-select: none;
      color: var(--text);
    }
    .http-details > summary::-webkit-details-marker { display: none; }
    .http-details[open] > summary {
      border-bottom: 1px solid var(--border);
      background: var(--surface3);
    }
    .http-details-fail > summary {
      color: var(--red);
    }
    .http-table-scroll {
      max-height: min(42vh, 380px);
      overflow-y: auto;
      overflow-x: auto;
    }
    .http-table-scroll table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface2);
      box-shadow: 0 1px 0 var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 8px 10px; vertical-align: middle; }

    /* ── Thumbnail ── */
    .thumb-wrap {
      width: 72px; height: 52px;
      background: var(--surface3);
      border-radius: 4px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .thumb-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      display: block;
    }
    .thumb-wrap .no-img {
      font-size: 18px;
      color: var(--muted);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      border-radius: 10px;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .badge-green  { background: rgba(81,207,102,.15); color: var(--green); }
    .badge-yellow { background: rgba(255,212,59,.15);  color: var(--yellow); }
    .badge-red    { background: rgba(255,107,107,.15); color: var(--red); }
    .badge-blue   { background: rgba(116,192,252,.15); color: var(--blue); }
    .badge-muted  { background: var(--surface3); color: var(--muted); }

    /* ── Size diff ── */
    .diff-up   { color: var(--red); }
    .diff-down { color: var(--green); }
    .diff-zero { color: var(--muted); }

    /* ── Similarity bar ── */
    .sim-wrap { display: flex; align-items: center; gap: 8px; }
    .sim-bar-bg {
      flex: 1; height: 6px;
      background: var(--surface3);
      border-radius: 3px;
      overflow: hidden;
      min-width: 60px;
    }
    .sim-bar { height: 100%; border-radius: 3px; transition: width .3s; }
    .sim-text { font-size: 11px; font-weight: 700; white-space: nowrap; }

    /* ── Visual diff loading ── */
    .diff-loading {
      width: 72px; height: 52px;
      background: var(--surface3);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--muted);
    }

    /* ── Unmatched section ── */
    .unmatched-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 12px;
    }
    .unmatched-col {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .unmatched-col-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .unmatched-col-title.a { color: var(--blue); }
    .unmatched-col-title.b { color: var(--purple); }
    .unmatched-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px; border-radius: 6px;
      border: 1px solid var(--border);
      margin-bottom: 6px;
      cursor: pointer;
      transition: background .1s, border-color .1s;
    }
    .unmatched-item:hover { background: var(--surface3); }
    .unmatched-item.selected {
      background: rgba(25,113,194,.15);
      border-color: var(--accent);
    }
    .unmatched-info { flex: 1; min-width: 0; }
    .unmatched-name { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .unmatched-size { font-size: 10px; color: var(--muted); }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 1000;
      padding: 24px;
      overflow-y: auto;
    }
    #lightbox.open { display: flex; flex-direction: column; }
    .lb-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .lb-title { font-size: 14px; font-weight: 700; color: #e9ecef; flex: 1; }
    .lb-nav { display: flex; gap: 8px; }
    .lb-close {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-size: 18px; padding: 4px 10px; cursor: pointer;
      line-height: 1;
    }
    .lb-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }
    .lb-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .lb-panel-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .lb-panel-title.a { color: var(--blue); }
    .lb-panel-title.b { color: var(--purple); }
    .lb-panel-title.diff { color: var(--orange); }
    .lb-img-wrap {
      background: var(--surface2);
      border-radius: 6px;
      padding: 8px;
      display: flex; align-items: center; justify-content: center;
      min-height: 200px;
      margin-bottom: 10px;
    }
    .lb-img-wrap img { max-width: 100%; max-height: 400px; object-fit: contain; }
    .lb-img-wrap canvas { max-width: 100%; }
    .lb-meta { font-size: 11px; color: var(--muted); line-height: 1.7; }
    .lb-meta span { color: var(--text); }

    /* ── Pair modal ── */
    #pair-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 900;
      align-items: center;
      justify-content: center;
    }
    #pair-modal.open { display: flex; }
    .pair-modal-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 900px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .pair-modal-title {
      font-size: 15px; font-weight: 700; color: #e9ecef;
      margin-bottom: 6px;
    }
    .pair-modal-sub {
      font-size: 12px; color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      z-index: 2000;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      max-width: 340px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; }

    /* ── Filename cell ── */
    .fname {
      font-size: 11px;
      font-family: 'Consolas', monospace;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .url-grid, .lb-grid, .unmatched-grid, .progress-grid { grid-template-columns: 1fr; }
      body { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <div class="page-header">
    <div class="page-title">🖼️ 圖片比對工具</div>
    <div class="page-subtitle">比對兩個環境的圖片資源差異 · HTTP 成功/失敗分開 · 視覺比對 · 大小分析</div>
  </div>

  <!-- ── Input Card ── -->
  <div class="card" id="input-card">
    <div class="card-title">🔗 輸入網址</div>
    <div class="url-grid">
      <div class="input-group">
        <label class="label-a">🔵 A 版（本機開發）</label>
        <input type="text" id="url-a" placeholder="http://localhost:8080" autocomplete="off">
      </div>
      <div class="input-group">
        <label class="label-b">🟣 B 版（原始環境，可留空）</label>
        <input type="text" id="url-b" placeholder="https://staging.example.com" autocomplete="off">
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:-6px;margin-bottom:12px;">
      可只填一個網址進行單站檢視（查看該站所有圖片的載入狀態與大小）。
    </div>

    <fieldset class="mode-fieldset" id="capture-mode-fieldset">
      <legend>擷取模式</legend>
      <div class="mode-options">
        <label class="mode-option">
          <input type="radio" name="captureMode" value="standard" checked>
          <span>
            <span class="mode-title">標準</span>
            <div class="mode-desc">一般頁面；較快結束。適合靜態或一次性載入的圖片。</div>
          </span>
        </label>
        <label class="mode-option">
          <input type="radio" name="captureMode" value="polling">
          <span>
            <span class="mode-title">含列表輪詢</span>
            <div class="mode-desc">房間列表等會<strong>定時刷新圖片</strong>時請選；會多等一陣子以涵蓋下一波請求（較久、較完整）。</div>
          </span>
        </label>
      </div>
    </fieldset>

    <div class="btn-row">
      <button class="btn-primary btn-large" id="btn-capture">🚀 開始擷取</button>
      <button class="btn-secondary btn-sm" id="btn-reset" style="display:none">↺ 重新開始</button>
    </div>

    <!-- Progress -->
    <div id="progress-area">
      <div class="progress-grid">
        <div class="progress-card">
          <div class="progress-label a">🔵 A 版</div>
          <div class="progress-bar-wrap"><div class="progress-bar a" id="prog-bar-a"></div></div>
          <div class="progress-msg" id="prog-msg-a">等待中…</div>
          <div class="progress-count" id="prog-cnt-a"></div>
        </div>
        <div class="progress-card">
          <div class="progress-label b">🟣 B 版</div>
          <div class="progress-bar-wrap"><div class="progress-bar b" id="prog-bar-b"></div></div>
          <div class="progress-msg" id="prog-msg-b">等待中…</div>
          <div class="progress-count" id="prog-cnt-b"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Results ── -->
  <div id="results">
    <!-- Tab Nav -->
    <div class="tab-nav" id="tab-nav">
      <button class="tab-btn active" data-tab="overview">📊 總覽</button>
      <button class="tab-btn" data-tab="http">📡 載入狀態</button>
      <button class="tab-btn" data-tab="size">📦 資源大小</button>
      <button class="tab-btn" data-tab="visual">🖼️ 視覺比對</button>
    </div>

    <!-- 總覽 -->
    <div class="tab-panel active" id="tab-overview"></div>

    <!-- HTTP 成功 / 失敗 -->
    <div class="tab-panel" id="tab-http"></div>

    <!-- 資源大小 -->
    <div class="tab-panel" id="tab-size"></div>

    <!-- 視覺比對 -->
    <div class="tab-panel" id="tab-visual"></div>
  </div>

  <!-- ── Lightbox ── -->
  <div id="lightbox">
    <div class="lb-header">
      <div class="lb-title" id="lb-title">圖片詳細比對</div>
      <div class="lb-nav">
        <button class="btn-secondary btn-sm" id="lb-prev">← 上一張</button>
        <button class="btn-secondary btn-sm" id="lb-next">下一張 →</button>
      </div>
      <button class="lb-close" id="lb-close">✕</button>
    </div>
    <div class="lb-grid">
      <div class="lb-panel">
        <div class="lb-panel-title a">🔵 A 版</div>
        <div class="lb-img-wrap" id="lb-img-a"><span style="color:var(--muted)">載入中…</span></div>
        <div class="lb-meta" id="lb-meta-a"></div>
      </div>
      <div class="lb-panel">
        <div class="lb-panel-title b">🟣 B 版</div>
        <div class="lb-img-wrap" id="lb-img-b"><span style="color:var(--muted)">載入中…</span></div>
        <div class="lb-meta" id="lb-meta-b"></div>
      </div>
      <div class="lb-panel">
        <div class="lb-panel-title diff">🔴 差異圖</div>
        <div class="lb-img-wrap" id="lb-img-diff"><span style="color:var(--muted)">計算中…</span></div>
        <div class="lb-meta" id="lb-meta-diff"></div>
      </div>
    </div>
  </div>

  <!-- ── Manual Pair Modal ── -->
  <div id="pair-modal">
    <div class="pair-modal-inner">
      <div class="pair-modal-title">🔗 手動配對未匹配圖片</div>
      <div class="pair-modal-sub">點選左側 A 版圖片，再點選右側 B 版圖片，即可完成配對。已配對項目會從清單移除。</div>
      <div id="pair-modal-body"></div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn-success" id="btn-pair-confirm">✅ 套用配對</button>
        <button class="btn-secondary" id="btn-pair-cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
